<div class="app-shell">
  <header class="app-header">
    <div class="app-brand">
      <p class="app-eyebrow">Bug bounty knowledge base</p>
      <h1 class="app-title">BountyNotes</h1>
    </div>

    <nav aria-label="Primary" class="app-nav">
      <a
        routerLink="/sources"
        routerLinkActive="app-nav-item-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="app-nav-item"
      >
        Sources
      </a>
      <a routerLink="/add" routerLinkActive="app-nav-item-active" class="app-nav-item">Add</a>
      <a routerLink="/ask" routerLinkActive="app-nav-item-active" class="app-nav-item">Ask</a>
    </nav>
  </header>

  <main class="app-content">
    <section class="app-panel">
      <router-outlet />
    </section>
  </main>
</div>
