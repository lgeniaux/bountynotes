<section class="citations-section">
  <div class="citations-header">
    <div>
      <p class="ui-kicker">Sources</p>
      <h3 class="ui-card-title">Citations</h3>
    </div>

    <span class="ui-badge ui-badge-neutral">{{ citations.length }}</span>
  </div>

  @if (citations.length === 0) {
    <app-page-state-card
      title="No citations returned"
      message="Try a broader question or remove some filters."
    />
  } @else {
    <div class="citation-list">
      @for (citation of citations; track citation.chunk_id) {
        <article class="citation-card ui-card">
          <div class="citation-header">
            <div>
              <h4 class="citation-title">{{ citation.title || 'Untitled source' }}</h4>
              <p class="citation-meta">
                Source #{{ citation.source_id }} - Score {{ citation.score }}
              </p>
            </div>
          </div>

          <p class="ui-copy citation-snippet">{{ citation.snippet }}</p>
        </article>
      }
    </div>
  }
</section>
