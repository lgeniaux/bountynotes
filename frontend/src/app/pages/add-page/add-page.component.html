<section class="page-layout add-page">
  <header class="add-page-header">
    <h2 class="page-title">Add source</h2>
  </header>

  <section class="composer-card">
    <app-add-source-mode-switch
      [selectedMode]="selectedMode"
      [disabled]="isSubmitting"
      (modeChange)="selectMode($event)"
    />

    @if (selectedMode === 'url') {
      <app-add-url-form
        [form]="urlForm"
        [isSubmitting]="isSubmitting"
        [submitLabel]="submitLabel"
        (submitted)="submitSource()"
      />
    } @else {
      <app-add-manual-form
        [form]="manualForm"
        [isSubmitting]="isSubmitting"
        [submitLabel]="submitLabel"
        (submitted)="submitSource()"
      />
    }
  </section>

  <app-source-create-feedback [createdSource]="createdSource" [errorMessage]="errorMessage" />
</section>
