@if (state$ | async; as state) {
  <section class="page-layout sources-page">
    <header class="page-header page-header-row sources-header">
      <div class="sources-heading">
        <h2 class="page-title">Sources</h2>
        <p class="sources-count">{{ state.sources.length }} total</p>
      </div>

      <a routerLink="/add" class="ui-button sources-add-button">Add source</a>
    </header>

    @if (state.isLoading) {
      <app-page-state-card
        title="Loading sources"
        message="Requesting the latest source list from the API."
      />
    } @else if (state.errorMessage) {
      <app-page-state-card
        title="Could not load sources"
        [message]="state.errorMessage"
        tone="error"
      />
    } @else if (state.sources.length === 0) {
      <app-page-state-card
        title="No sources yet"
        message="Add a URL or a manual note to start building the knowledge base."
      />
    } @else {
      <div class="sources-list" aria-label="Sources list">
        @for (source of state.sources; track source.id) {
          <app-source-card [source]="source" />
        }
      </div>
    }
  </section>
}
