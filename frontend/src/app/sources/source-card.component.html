<article class="source-card ui-card">
  <div class="source-card-header">
    <div>
      <p class="source-meta ui-kicker">Source #{{ source.id }}</p>
      <h3 class="ui-card-title">{{ source.title?.trim() || 'Untitled source' }}</h3>
    </div>

    <div class="source-badges">
      <span class="ui-badge ui-badge-accent">{{ source.source_type | titlecase }}</span>
      <span class="ui-badge ui-badge-neutral">{{ source.status | titlecase }}</span>
    </div>
  </div>

  <dl class="source-details">
    <div>
      <dt>Created</dt>
      <dd>{{ source.created_at | date: 'medium' }}</dd>
    </div>
    <div>
      <dt>Updated</dt>
      <dd>{{ source.updated_at | date: 'medium' }}</dd>
    </div>
  </dl>
</article>
