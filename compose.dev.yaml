services:
  web:
    command: npm start -- --poll 1000
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules

  api:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

volumes:
  web_node_modules:
